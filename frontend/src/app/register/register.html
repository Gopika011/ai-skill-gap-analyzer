<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <!-- <p class="muted">Register to start managing skills profiles</p> -->
    </div>

    <form (ngSubmit)="register()">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="name@company.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="pass">Password</label>
        <input
          id="pass"
          type="password"
          [(ngModel)]="pass"
          name="pass"
          placeholder="••••••••"
          required
        />
      </div>

      @if (message) {
        <div class="alert" [class.alert-danger]="isError" [class.alert-success]="!isError">
          {{ message }}
        </div>
      }

      <button type="submit" [disabled]="loading" class="btn-auth">
        @if (loading) {
          Creating account...
        } @else {
          Register
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Login</a></p>
    </div>
  </div>
</div>
